<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 220px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      margin: 0;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.on { background: #22c55e; }
    .dot.off { background: #ef4444; }
    .label { font-weight: 600; }
    .hint {
      color: #666;
      font-size: 11px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="status">
    <div class="dot off" id="dot"></div>
    <span class="label" id="label">Disconnected</span>
  </div>
  <div class="hint" id="hint">Start ZeptoBot to connect.</div>
  <script src="popup.js"></script>
</body>
</html>
